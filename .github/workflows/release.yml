name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: arm64
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build and Bundle (macOS)
        if: contains(matrix.os, 'macos')
        run: |
          cargo install cargo-bundle
          cargo bundle --release --target ${{ matrix.target }}

      - name: Prepare Binaries
        shell: bash
        run: |
          mkdir -p release_assets
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/apple_music_rpc.exe release_assets/apple_music_rpc_windows_${{ matrix.arch }}.exe
          else
            echo "Listing files to debug bundle location:"
            find target -name "*.app"
            
            APP_PATH=$(find target/${{ matrix.target }}/release/bundle/dmg/ -maxdepth 1 -name "*.dmg" | head -n 1)

            if [ -z "$APP_PATH" ]; then
              echo "Error: Could not find any release bundle!"
              exit 1
            fi
            
            echo "Found app at: $APP_PATH"
            cp "$APP_PATH" release_assets/AppleMusicRPC_${{ matrix.arch }}.dmg
          fi
      - name: Upload binaries
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}